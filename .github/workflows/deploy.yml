name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:         # allow manual trigger from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npx tsc --noEmit

      # ── Wrangler knows which KV namespaces to use from wrangler.jsonc.
      # ── The IDs in wrangler.jsonc must already be set to real namespace IDs
      # ── (not the "aaa..." placeholders) before this action will succeed.
      # ── One-time setup:
      # ──   npx wrangler kv namespace create "CACHE_KV"      → update wrangler.jsonc
      # ──   npx wrangler kv namespace create "RATE_LIMIT_KV" → update wrangler.jsonc
      # ──   git commit wrangler.jsonc
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
